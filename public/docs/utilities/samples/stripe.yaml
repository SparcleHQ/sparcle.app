schema_version: 1
id: stripe
chip: =stripe
title: Stripe
icon: credit-card
description: Recent customers.
emits: Account
auth_profile_ref: stripe_user

requires:
  - mcp: stripe
    version: ^1
    tools: ["list_customers"]
    scopes: ["read_only"]

scopes:
  - id: recent
    label: Recent
    default: true
    flow:
      - call:
          kind: mcp
          mcp: stripe
          tool: list_customers
          args:
        limit: '{{limit}}'
        out: r
      - emit: r
        path: /data

actions:
  - id: open
    kind: url
    target: row
    label: Open
    icon: external_link
    url_template: '{{row.url | default:row.html_url | default:row.htmlLink | default:''#''}}'

presentation:
  widget: list
  title_field: id
  subtitle_field: name
  list_fields:
    - id
    - name
    - email
    - created
  search_fields:
    - id
  searchable: true
  row_key_field: id
  right_widget:
    kind: card
    mode: selected_row
    bind:
      title: '{{row.id}}'
      actions: [open]

enabled: true
provisioning_mode: public
departments: []
roles: []
groups: []
