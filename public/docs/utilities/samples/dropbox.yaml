schema_version: 1
id: dropbox
chip: =dropbox
title: Dropbox
icon: package
description: Recent files from Dropbox.
emits: File
auth_profile_ref: dropbox_user

requires:
  - mcp: dropbox
    version: ^1
    tools: ["list_files"]
    scopes: ["files.metadata.read"]

scopes:
  - id: recent
    label: Recent
    default: true
    flow:
      - call:
          kind: mcp
          mcp: dropbox
          tool: list_files
          args:
        limit: '{{limit}}'
        out: r
      - emit: r
        path: /entries

actions:
  - id: open
    kind: url
    target: row
    label: Open
    icon: external_link
    url_template: '{{row.url | default:row.html_url | default:row.htmlLink | default:''#''}}'

presentation:
  widget: list
  title_field: name
  subtitle_field: modified
  list_fields:
    - name
    - modified
    - owner
  search_fields:
    - name
  searchable: true
  row_key_field: id
  right_widget:
    kind: card
    mode: selected_row
    bind:
      title: '{{row.name}}'
      actions: [open]

enabled: true
provisioning_mode: public
departments: []
roles: []
groups: []
