schema_version: 1
id: figma
chip: =figma
title: Figma
icon: figma
description: My recent Figma files.
emits: Document
auth_profile_ref: figma_user

requires:
  - mcp: figma
    version: ^1
    tools: ["my_files"]
    scopes: ["files:read"]

scopes:
  - id: recent
    label: Recent
    default: true
    flow:
      - call:
          kind: mcp
          mcp: figma
          tool: my_files
          args:
        limit: '{{limit}}'
        out: r
      - emit: r
        path: /files

actions:
  - id: open
    kind: url
    target: row
    label: Open
    icon: external_link
    url_template: '{{row.url | default:row.html_url | default:row.htmlLink | default:''#''}}'

presentation:
  widget: list
  title_field: name
  subtitle_field: last_modified
  list_fields:
    - name
    - last_modified
    - editor_name
  search_fields:
    - name
  searchable: true
  row_key_field: id
  right_widget:
    kind: card
    mode: selected_row
    bind:
      title: '{{row.name}}'
      actions: [open]

enabled: true
provisioning_mode: public
departments: []
roles: []
groups: []
