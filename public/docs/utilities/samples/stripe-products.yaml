# =stripe — structured rows + wide detail pane (via bolt-stripe.sh). CLI-gated.
# NOTE: rewritten to the CLI's JSON output (live-unverified against every CLI
# version); the helper falls back to line rows if the shape is unexpected.
schema_version: 1
runtime: bridge
id: stripe
chip: stripe
title: Stripe Products
icon: credit-card
description: "List via the `stripe` CLI. Enter to load, then filter the results."
placeholder_examples: ["Enter to load — then filter the results"]
emits: Generic

detect:
  binary: stripe
  auth_check:
    macos: "stripe config --list"
    linux: "stripe config --list"
    windows: "stripe config --list"
  config_hint: ["~/.config/stripe"]
  refresh: on_focus

args:
  - { name: filter, from: "query.word(0)", default: "" }

dispatch:
  confirm_label: "List your Stripe products"
  confirm_hint: "Press ↵ to load · filter the results as you type"

bridge:
  command:
    macos: "python3 {{scripts_dir}}/bolt-stripe.py {{filter}}"
    linux: "python3 {{scripts_dir}}/bolt-stripe.py {{filter}}"
    windows: "python {{scripts_dir}}/bolt-stripe.py {{filter}}"
  parse: json
  timeout_seconds: 20

presentation:
  widget: list
  title_field: title
  subtitle_field: subtitle
  searchable: true
  right_widget:
    kind: entity_preview
    mode: selected_row
    bind:
      title: "{{row.title}}"
      subtitle: "{{row.subtitle}}"
      fields:
        - { label: ID, value: "{{row.id}}" }
        - { label: Active, value: "{{row.active}}" }
      body: "{{row.body}}"
      actions: [copy]

actions:
  - { id: copy, kind: composer, target: row, label: Copy, insert: "{{title}}" }
