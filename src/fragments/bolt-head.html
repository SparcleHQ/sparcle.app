<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<style>
        :root {
            --bg: #050810;
            --bg2: #0a0f1e;
            --surface: #0d1426;
            --surface2: #111827;
            --border: rgba(99, 120, 255, 0.15);
            --accent: #6378ff;
            --accent2: #a78bfa;
            --green: #22d3a0;
            --amber: #f59e0b;
            --red: #f87171;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --glow: 0 0 60px rgba(99, 120, 255, 0.25);
            --r: 16px;
        }

        [data-theme="light"] {
            --bg: #eef3ff;
            --bg2: #e5edfb;
            --surface: #ffffff;
            --surface2: #f6f9ff;
            --border: rgba(37, 99, 235, 0.2);
            --accent: #1d4ed8;
            --accent2: #4338ca;
            --green: #166534;
            --amber: #b45309;
            --red: #b91c1c;
            --text: #0b1220;
            --text2: #334155;
            --text3: #475569;
            --glow: 0 0 50px rgba(37, 99, 235, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(5, 8, 16, 0.85);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #6378ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none
        }

        .nav-links a {
            color: var(--text2);
            text-decoration: none;
            font-size: .85rem;
            font-weight: 500;
            transition: color .2s
        }

        .nav-links a:hover {
            color: var(--text)
        }

        /* ── SECTIONS ── */
        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 6rem 2rem 4rem;
            max-width: 1200px;
            margin: 0 auto
        }

        section.full {
            max-width: 100%;
            padding: 6rem 0 4rem
        }

        .section-tag {
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .section-tag::before {
            content: '';
            width: 32px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent)
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -.03em
        }

        h2 {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -.02em
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 700
        }

        p {
            line-height: 1.7;
            color: var(--text2)
        }

        .gradient-text {
            background: linear-gradient(135deg, #6378ff 0%, #a78bfa 50%, #22d3a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        /* ── HERO ── */
        #hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 6rem 2rem
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 900px 700px at 50% 40%, rgba(99, 120, 255, .18) 0%, transparent 70%);
            pointer-events: none
        }

        .hero-subtitle {
            color: var(--text2);
            font-size: 1.2rem;
            max-width: 700px;
            margin: 1.5rem auto
        }

        .hero-stats {
            display: flex;
            gap: 3rem;
            justify-content: center;
            margin: 3rem 0;
            flex-wrap: wrap
        }

        .stat {
            text-align: center
        }

        .stat-num {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .stat-label {
            font-size: .8rem;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-top: .25rem
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem
        }

        .btn {
            padding: .8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: .95rem;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: .5rem
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            box-shadow: 0 4px 24px rgba(99, 120, 255, .4)
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(99, 120, 255, .5)
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border)
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        /* ── CARDS ── */
        .card-grid {
            display: grid;
            gap: 1.5rem;
            margin-top: 3rem
        }

        .card-grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr))
        }

        .card-grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr))
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.75rem;
            transition: all .25s;
            position: relative;
            overflow: hidden
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99, 120, 255, .05), transparent);
            opacity: 0;
            transition: opacity .25s
        }

        .card:hover {
            border-color: rgba(99, 120, 255, .4);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(99, 120, 255, .15)
        }

        .card:hover::before {
            opacity: 1
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 1rem
        }

        .card h3 {
            margin-bottom: .5rem
        }

        .card p {
            font-size: .9rem
        }

        /* ── PROBLEM ── */
        .pain-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem
        }

        .pain-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1.25rem 1.5rem;
            background: rgba(248, 113, 113, .06);
            border: 1px solid rgba(248, 113, 113, .2);
            border-radius: 12px
        }

        .pain-item .icon {
            font-size: 1.5rem;
            flex-shrink: 0;
            margin-top: .1rem
        }

        .pain-item strong {
            color: var(--text);
            display: block;
            margin-bottom: .25rem
        }

        .pain-item p {
            font-size: .9rem;
            margin: 0
        }

        /* ── ARCH DIAGRAM ── */
        #arch {
            background: var(--bg2);
            padding: 4rem 2rem
        }

        .arch-inner {
            max-width: 1100px;
            margin: 0 auto
        }

        .mermaid-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 2rem;
            margin-top: 2.5rem;
            overflow-x: auto
        }

        .mermaid {
            text-align: center
        }

        /* ── FEATURE PILLARS ── */
        .pillar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            padding: 3rem 0;
            border-bottom: 1px solid var(--border)
        }

        .pillar:last-child {
            border-bottom: none
        }

        .pillar.reverse {
            direction: rtl
        }

        .pillar.reverse>* {
            direction: ltr
        }

        .pillar-visual {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 2rem;
            position: relative;
            overflow: hidden
        }

        .pillar-visual::after {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(99, 120, 255, .2), transparent 70%);
            pointer-events: none
        }

        .badge-list {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem;
            margin-top: 1rem
        }

        .badge {
            padding: .3rem .75rem;
            border-radius: 50px;
            font-size: .75rem;
            font-weight: 600;
            background: rgba(99, 120, 255, .15);
            color: var(--accent);
            border: 1px solid rgba(99, 120, 255, .25)
        }

        .badge.green {
            background: rgba(34, 211, 160, .12);
            color: var(--green);
            border-color: rgba(34, 211, 160, .25)
        }

        .badge.amber {
            background: rgba(245, 158, 11, .12);
            color: var(--amber);
            border-color: rgba(245, 158, 11, .25)
        }

        /* ── PLATFORM GRID ── */
        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-top: 2.5rem
        }

        .platform-tile {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem 1rem;
            text-align: center;
            transition: all .2s
        }

        .platform-tile:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(99, 120, 255, .15)
        }

        .platform-tile .icon {
            font-size: 2.5rem;
            margin-bottom: .75rem
        }

        .platform-tile p {
            font-size: .8rem;
            color: var(--text2);
            margin-top: .25rem
        }

        /* ── COMPARE TABLE ── */
        .compare-wrap {
            overflow-x: auto;
            margin-top: 2.5rem
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .9rem
        }

        thead tr {
            background: rgba(99, 120, 255, .1)
        }

        th,
        td {
            padding: 1rem 1.25rem;
            text-align: left;
            border-bottom: 1px solid var(--border)
        }

        th {
            font-weight: 600;
            color: var(--text);
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .08em
        }

        td {
            color: var(--text2)
        }

        tr:hover td {
            background: rgba(255, 255, 255, .02)
        }

        .check {
            color: var(--green);
            font-weight: 700
        }

        .cross {
            color: var(--text3)
        }

        .partial {
            color: var(--amber)
        }

        td.highlight {
            color: var(--text);
            font-weight: 600
        }

        /* ── SECURITY ── */
        .layers {
            display: flex;
            flex-direction: column;
            gap: .5rem;
            margin-top: 2rem
        }

        .layer {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
            font-size: .9rem;
            transition: all .2s
        }

        .layer:hover {
            background: var(--surface2);
            border-left-color: var(--green)
        }

        .layer-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: .75rem;
            color: var(--accent);
            font-weight: 600;
            min-width: 26px
        }

        .layer-label {
            color: var(--text);
            font-weight: 500;
            min-width: 200px
        }

        .layer-desc {
            color: var(--text2);
            font-size: .85rem
        }

        /* ── MCP INTEGRATIONS ── */
        .mcp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: .75rem;
            margin-top: 2rem
        }

        .mcp-tile {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .9rem;
            display: flex;
            align-items: center;
            gap: .6rem;
            font-size: .85rem;
            font-weight: 500;
            transition: border-color .2s
        }

        .mcp-tile:hover {
            border-color: var(--accent)
        }

        .mcp-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0
        }

        /* ── VIDEO ── */
        #demo {
            background: var(--bg2);
            padding: 5rem 2rem;
            text-align: center
        }

        .demo-inner {
            max-width: 960px;
            margin: 0 auto
        }

        .video-wrap {
            margin-top: 3rem;
            border-radius: var(--r);
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--glow);
            position: relative
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000
        }

        /* ── CTA ── */
        #cta {
            background: radial-gradient(ellipse 1000px 500px at 50% 50%, rgba(99, 120, 255, .2), transparent);
            text-align: center;
            padding: 8rem 2rem
        }

        /* ── FOOTER ── */
        footer {
            background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: var(--text3);
            font-size: .8rem
        }

        /* ── ANIMATIONS ── */
        .fade-up {
            opacity: 0;
            transform: translateY(32px);
            transition: opacity .6s ease, transform .6s ease
        }

        .fade-up.visible {
            opacity: 1;
            transform: none
        }

        /* ── RESPONSIVE ── */
        @media(max-width:768px) {
            .pillar {
                grid-template-columns: 1fr
            }

            .pillar.reverse {
                direction: ltr
            }

            .hero-stats {
                gap: 1.5rem
            }

            .nav-links {
                display: none
            }
        }
    </style>
