<style>
.answers-doc{
    --bg:#ffffff; --fg:#141922; --muted:#5a6472; --line:#e5e8ee;
    --accent:#2b5cff; --good:#127a4a; --warn:#8a5a00; --card:#f7f9fc;
    --maxw:860px;
  }

  @media (prefers-color-scheme: dark){.answers-doc{ --bg:#0f1216; --fg:#e7ebf2; --muted:#9aa5b4; --line:#232a34;
      --accent:#6d92ff; --good:#4fd08a; --warn:#e0b25a; --card:#161b22; }

  }
.answers-doc *{box-sizing:border-box}
.answers-doc{-webkit-text-size-adjust:100%;text-size-adjust:100%}
.answers-doc{margin:0;background:var(--bg);color:var(--fg);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    letter-spacing:.1px}
.answers-doc .gt-wrap{max-width:var(--maxw);margin:0 auto;padding:48px 24px 96px}
.answers-doc header.gt-top{border-bottom:1px solid var(--line);padding-bottom:28px;margin-bottom:36px}
.answers-doc .gt-kicker{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.answers-doc h1{font-size:34px;line-height:1.15;margin:.35em 0 .25em;letter-spacing:-.4px}
.answers-doc h2{font-size:24px;line-height:1.2;margin:2.4em 0 .5em;letter-spacing:-.3px;scroll-margin-top:20px}
.answers-doc h3{font-size:18px;margin:1.8em 0 .4em}
.answers-doc .gt-lede{font-size:18px;color:var(--muted);max-width:62ch}
.answers-doc p{margin:.7em 0}
.answers-doc a{color:var(--accent);text-decoration:none}
.answers-doc a:hover{text-decoration:underline}
.answers-doc .gt-toc{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 22px;margin:8px 0 8px}
.answers-doc .gt-toc h4{margin:0 0 8px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.answers-doc .gt-toc ol{margin:0;padding-left:20px;columns:2;column-gap:28px}
.answers-doc .gt-toc li{margin:4px 0}
.answers-doc .gt-pillars{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}

  @media(max-width:640px){.answers-doc .gt-pillars{grid-template-columns:1fr}
.answers-doc .gt-toc ol{columns:1}}
.answers-doc .gt-pill{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.answers-doc .gt-pill b{display:block;margin-bottom:4px}
.answers-doc .gt-pill span{color:var(--muted);font-size:14px}
.answers-doc table{border-collapse:collapse;width:100%;margin:16px 0;font-size:14.5px}
.answers-doc th, .answers-doc td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
.answers-doc th{background:var(--card);font-weight:600}
.answers-doc .gt-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.04em;
    padding:2px 7px;border-radius:999px;white-space:nowrap}
.answers-doc .gt-ga{background:color-mix(in srgb,var(--good) 16%,transparent);color:var(--good)}
.answers-doc .gt-staged{background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn)}
.answers-doc code, .answers-doc kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13.5px}
.answers-doc kbd{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:1px 6px}
.answers-doc pre{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;
    overflow-x:auto;font-size:13px;line-height:1.5}
.answers-doc .gt-faq{border:1px solid var(--line);border-radius:12px;margin:12px 0;overflow:hidden;background:var(--card)}
.answers-doc .gt-faq summary{cursor:pointer;padding:14px 18px;font-weight:600;list-style:none;position:relative}
.answers-doc .gt-faq summary::-webkit-details-marker{display:none}
.answers-doc .gt-faq summary::after{content:"+";position:absolute;right:18px;color:var(--muted);font-weight:400}
.answers-doc .gt-faq[open] summary::after{content:"–"}
.answers-doc .gt-faq .gt-body{padding:0 18px 16px;color:var(--fg)}
.answers-doc .gt-faq .gt-body p:first-child{margin-top:0}
.answers-doc .gt-note{border-left:3px solid var(--accent);padding:2px 0 2px 16px;margin:16px 0;color:var(--muted)}
.answers-doc footer{margin-top:64px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:13px}

  @media print{.answers-doc{--bg:#fff;--fg:#111;--muted:#444;--line:#ccc;--card:#f4f4f4;--accent:#1a3fb8}
.answers-doc{font-size:11pt}
.answers-doc .gt-wrap{padding:0}
.answers-doc .gt-faq{break-inside:avoid}
.answers-doc .gt-faq summary::after{display:none}
.answers-doc .gt-faq .gt-body{display:block!important}
.answers-doc h2{break-after:avoid}
.answers-doc a{color:inherit;text-decoration:none}
.answers-doc .gt-toc{break-inside:avoid}

  }



:root[data-theme="dark"] .answers-doc{ --bg:#0f1216; --fg:#e7ebf2; --muted:#9aa5b4; --line:#232a34; --accent:#6d92ff; --good:#4fd08a; --warn:#e0b25a; --card:#161b22; }
:root[data-theme="light"] .answers-doc{ --bg:#ffffff; --fg:#141922; --muted:#5a6472; --line:#e5e8ee; --accent:#2b5cff; --good:#127a4a; --warn:#8a5a00; --card:#f7f9fc; }
.answers-doc{ padding: 6rem 0 4rem; }

/* Layout hardening: this page renders inside the full-width site <main>, so the
   content must self-constrain and no grid/table may overflow horizontally. */
.answers-doc{ max-width: 960px; margin-inline: auto; overflow-x: clip; }
.answers-doc .gt-wrap{ max-width: none; width: 100%; box-sizing: border-box; padding: 24px 24px 96px; }
.answers-doc .gt-pillars{ grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
.answers-doc .gt-pill{ min-width: 0; }
.answers-doc table{ table-layout: fixed; width: 100%; }
.answers-doc th, .answers-doc td{ overflow-wrap: anywhere; }
.answers-doc pre{ white-space: pre-wrap; word-break: break-word; }
@media (max-width: 640px){ .answers-doc .gt-toc ol{ columns: 1; } }
</style>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {"@type":"Question","name":"Does Bolt work offline, and is it really useful before the AI fires?","acceptedAnswer":{"@type":"Answer","text":"Yes. Bolt opens as a desktop launcher and does 80+ instant utilities (JSON, base64, hashes, JWT, regex, time zones, currency, and more), clipboard history, notes, screenshot OCR, and local file search with no model call and no network. The launcher earns its keep before any AI cost starts. You can verify by turning off Wi-Fi and watching local tasks keep working."}},
    {"@type":"Question","name":"Does Bolt have clipboard history?","acceptedAnswer":{"@type":"Answer","text":"Yes. Bolt captures copied text, images, and files into a searchable, pinnable clipboard history, stored encrypted on your device."}},
    {"@type":"Question","name":"Can Bolt search my screenshots and local files?","acceptedAnswer":{"@type":"Answer","text":"Yes. On-device OCR makes the text inside screenshots and images searchable, and an opt-in on-device image model adds visual search. Bolt also indexes and searches your own file locations such as Home, Desktop, Documents, and Downloads by name and content, with exclusions you control."}},
    {"@type":"Question","name":"Does Bolt keep notes, and can I annotate images?","acceptedAnswer":{"@type":"Answer","text":"Yes to both. Bolt has device-local rich notes (formatting, lists, checklists, tables, links) with full-text search, encrypted at rest. You can also mark up screenshots and images with arrows, text, and redaction, then keep or securely share the result."}},
    {"@type":"Question","name":"Can I share files and notes securely, and where are they stored?","acceptedAnswer":{"@type":"Answer","text":"Yes. Bolt turns a note or an annotated screenshot into an expiring, revocable link. Every file is encrypted on your device before it is stored, and the storage is yours: your own cloud drive (Google Drive, OneDrive, Dropbox) or, for teams, your organization's own S3 or MinIO bucket. The bytes never touch Sparcle. You control expiry (one hour to never), password, download limits, org-only access, and instant revoke, with a per-open audit trail."}},
    {"@type":"Question","name":"Does Bolt have a terminal, and is it governed?","acceptedAnswer":{"@type":"Answer","text":"Yes. There is a real terminal and tmux in the launcher. Commands you type by hand are never governed, but any command Bolt itself injects (a saved recipe, a tmux send, an agent action) crosses a native policy chokepoint where admins allow or deny by rule, and the whole capability can be disabled by policy for regulated orgs. Deny and catastrophic-command enforcement are live today; a confirm-before-destructive dialog is staged."}},
    {"@type":"Question","name":"Can I run coding agents like Devin or Claude Code inside Bolt?","acceptedAnswer":{"@type":"Answer","text":"Yes. Through the open Agent Client Protocol you can run Devin, Claude Code, Codex, or Gemini locally on your workspace, under the same approvals and audit, so you are not locked to one vendor's agent. Bolt hosts the agent locally; deeper server-side orchestration is a staged follow-up."}},
    {"@type":"Question","name":"Is running AI in Bolt expensive?","acceptedAnswer":{"@type":"Answer","text":"It is designed not to be. A lightweight classifier runs before the agent loop and skips the model and tool-loading entirely for knowledge, greeting, and meta questions, and most everyday queries resolve on instant local engines with no model call at all. When a model is needed, Bolt caches the stable prompt prefix for a large discount and enforces a token budget, and because you bring your own key there is zero token markup. PII masking still runs on that fast path."}},
    {"@type":"Question","name":"Can Bolt use my password vault?","acceptedAnswer":{"@type":"Answer","text":"Yes. Bolt searches across your connected vaults (1Password, Bitwarden, Apple Keychain, Windows Credentials) and copies a password, username, or TOTP in one keystroke, locally. Revealing a corporate or shared secret is policy-gated and audited; personal vaults stay ungoverned. Bolt can also generate strong passwords on demand."}},
    {"@type":"Question","name":"Can Bolt use my screen, selection, or current tab as context?","acceptedAnswer":{"@type":"Answer","text":"Yes. A Chrome extension brings the current tab and selection to Bolt, and the launcher can pull your screen, selection, open tab, clipboard, or an on-device OCR of what is on screen into a prompt as first-class context. The sensitive ones are masked at the boundary before any model sees them."}},
    {"@type":"Question","name":"How many tools can Bolt replace?","acceptedAnswer":{"@type":"Answer","text":"Easily two dozen categories: clipboard manager, snippet expander, JSON/regex/hash/JWT tools, timezone and currency converters, UUID and password generators, QR and color tools, screenshot-OCR search, local file search, a notes and annotation app, a password-vault front end, a secure file-sharing tool, a terminal, enterprise search, a cross-system agent, and an AI chat client, all under one identity and audit. Fewer licenses, fewer vendors, and fewer places your data can leak."}},
    {"@type":"Question","name":"Is there a screen-share-safe mode for demos and meetings?","acceptedAnswer":{"@type":"Answer","text":"Yes. One toggle widens on-screen masking to an extended tier (email, phone, and more) so nothing identifying is painted while you screen-share or present; secrets and marked-sensitive values stay hidden regardless. Automatic meeting detection is a staged follow-up; the manual toggle is live."}},
    {"@type":"Question","name":"Does Bolt have voice search or voice input?","acceptedAnswer":{"@type":"Answer","text":"Yes, and it is fully on-device. You can speak to the launcher; the microphone is captured and transcribed locally with Whisper, so audio never leaves the machine, unlike cloud dictation. Bolt adopts a local Whisper model if one is present, otherwise offers a one-time download. Voice input is currently an opt-in Labs experiment in builds that include it, not on by default."}},
    {"@type":"Question","name":"Is my local data encrypted at rest?","acceptedAnswer":{"@type":"Answer","text":"Yes. Clipboard history, notes, and screenshot indexes are stored in a whole-database-encrypted local store, with the encryption key derived on-device and file-permission locked. Connector and OAuth tokens are held in a separate AES-256-GCM vault. Nothing local sits in plaintext."}},
    {"@type":"Question","name":"How deep is the offline surface, really?","acceptedAnswer":{"@type":"Answer","text":"Deep. Beyond the utilities, Bolt carries a large offline knowledge catalog (currency, country and airport codes, time zones, HTTP status, ports, MIME types, ICD-10, exit codes, chmod, ASCII, and more), recognizes hundreds of value shapes on sight, and validates identifiers with real check-digit math offline (Luhn, IBAN, ISO 7064, Verhoeff for Aadhaar, plus 17+ national validators). Every paste is also scanned locally for hidden and dangerous characters, homograph attacks, and leaked secrets. None of this needs a network."}},
    {"@type":"Question","name":"Does Bolt protect against Trojan-Source and homograph attacks?","acceptedAnswer":{"@type":"Answer","text":"Yes, offline, on every paste. Bolt flags hidden bidirectional and zero-width characters (the Trojan-Source class), homograph and confusable look-alikes, and leaked secrets such as cloud keys and private keys, before the content goes anywhere."}},
    {"@type":"Question","name":"How does Bolt serve regulated industries like healthcare, finance, and defense?","acceptedAnswer":{"@type":"Answer","text":"Through swappable, signed compliance and vertical packs. 28 ship in the box, including healthcare, finance, defense, and legal cores plus jurisdiction privacy packs (GDPR, UK GDPR, CCPA, LGPD, DPDP, PIPL, APPI, PIPA, PDPA, POPIA, and more). An enabled pack masks or blocks its sensitive patterns at the model boundary and validates national IDs with real check-digit math. Packs install offline as signed bundles, so new regulation reaches an air-gapped deployment without a software update, and you can author your own pack in a short YAML manifest."}},
    {"@type":"Question","name":"Can I add a new country or regulation myself, air-gapped?","acceptedAnswer":{"@type":"Answer","text":"Yes. A regulation pack is a short signed YAML manifest (jurisdiction, residency, retention, rights, safeguards, recognizers). You, a partner, or your counsel can author and sign one, and it installs offline with a review-and-consent step. Multi-jurisdiction is stacking packs."}},
    {"@type":"Question","name":"Is Bolt a SaaS? Should I evaluate it like one?","acceptedAnswer":{"@type":"Answer","text":"No, and this trips up a lot of security reviews. Bolt is self-hosted software that runs inside your own perimeter; Sparcle operates no cloud that receives your data and has no hosted ingest path. So you do not evaluate a Sparcle-run production environment the way you would a SaaS vendor, because there is not one handling your data. What you evaluate is the software and the architecture, running under your own controls. That is a different, and for regulated buyers usually stronger, security posture."}},
    {"@type":"Question","name":"Do you have SOC 2 Type II?","acceptedAnswer":{"@type":"Answer","text":"Short answer: your data never touches our servers, so the core of what a SaaS SOC 2 certifies, how a vendor guards your data inside its cloud, does not exist here. Bolt is self-hosted; there is no Sparcle-run environment holding your data to audit. Better still, the real substance of SOC 2 Type II is evidence that controls operate effectively over a period of time. Because you run Bolt yourself and it emits a tamper-evident, independently verifiable audit trail, you and your auditor can verify the deployed controls and their operation continuously, in your own environment, over time, instead of waiting on a vendor's annual attestation window. What a company-level SOC 2 still speaks to is our own engineering and security practices. On that: SOC 2 Type I is targeted for Q4 2026 and Type II for Q2 2027; a readiness package and gap analysis are available now; and our Trust Center maps SOC 2, HIPAA, GDPR, and ISO 27001 criteria to concrete evidence, with independent penetration testing. If your procurement hard-requires a completed vendor SOC 2 Type II report today, that is a fair reason to wait."}},
    {"@type":"Question","name":"What exactly does Bolt's DLP cover, and where does it stop?","acceptedAnswer":{"@type":"Answer","text":"It covers the request path into the model, and it covers it unconditionally. Every request body is scanned for sensitive values before the LLM adapter is invoked, detected values are replaced with opaque tokens, and the mapping is rehydrated on the way out, so the model sees tokens and your user sees real values. It sits above a swappable provider layer by design, so changing model or backend does not switch the policy off, and tool results are re-masked before they go back into the agent loop. Where it stops today: values a user has asked Bolt to remember are assembled into the system prompt as stored, so a remembered identifier sits outside the masking layer until we route memory through the same chokepoint, which is in flight. Separately, name detection in free text is a bring-your-own sidecar with no endpoint configured by default, so recall on names depends on you wiring it; pattern and check-digit detection for structured identifiers does not. If your policy needs the memory gap closed before rollout, keep user memory off and we will tell you when it lands."}},
    {"@type":"Question","name":"Is the audit trail complete? Can I prove nothing is missing?","acceptedAnswer":{"@type":"Answer","text":"Complete for what it covers, and it is worth being precise about what that is. Aeira search seals an event for every query it serves, on all three exit paths (denied, router-allowed, keyword-allowed), and it cannot fail open: the same Postgres that wires the audit sink is required to run a search at all, so the failure mode is an error, not a silent unrecorded answer. Privileged admin actions, tool calls, LLM calls, and agent-run state transitions are in the chain too, sealed into an Ed25519-signed Merkle structure that a standalone verifier checks offline with nothing from Sparcle in the loop. What is not in the chain today: Aeira's catalog browse routes and Bolt's own connector-side search endpoints return results without emitting an event. Routing both through the same emit chokepoint is in flight. On proof: the verifier confirms that what was recorded has not been altered. It cannot confirm that everything that happened was recorded, and no chain construction can. Detecting a missing event means comparing the chain against a complementary signal, typically your SIEM or your own access logs. We say the same thing on the Trust Center rather than only when a reviewer asks."}},
    {"@type":"Question","name":"Can I push a policy change to every installed Bolt from one console?","acceptedAnswer":{"@type":"Answer","text":"Not as a push, not today, and I would rather say so than let you plan a rollout around it. Policy itself lives server-side: the desktop client fetches its capability set from the server, so a central policy change does change what a user can do the next time their client asks. That part is real, and it is how terminal execution and the vertical packs are gated now. What does not exist is device fleet management. There is no enrollment, no device registry, no push channel, no targeting by group or platform, and no delivery confirmation telling you which machines picked a change up. Distributing the app itself goes through whatever you already run (Intune, Jamf, your own packaging). If your requirement is to change a policy and see confirmed application across thousands of endpoints inside an hour, Bolt does not do that yet and you should score it accordingly."}},
    {"@type":"Question","name":"What is the access-control model, and how much of it is on by default?","acceptedAnswer":{"@type":"Answer","text":"Layered, and most of it is on out of the box. Session middleware, admin-only middleware, and OAuth scope checks gate the HTTP surface. The agent loop runs a per-tool capability check before it invokes anything. Aeira applies the per-tenant ACL as a SQL pre-filter on search, with no bypass flag, so rows a user cannot see never enter the candidate set. Those are default-on wherever there is a database. The capability list itself is compiled into the server rather than declared in configuration, which is deliberate: no manifest or YAML edit can invent a capability or widen an existing one. What is off by default is the optional policy decision point, the rule-based layer for finer-grained capability policy. It ships in the box, no shipped configuration file enables it, and turning it on is a deliberate deployment choice we walk through during a pilot. So RBAC enforced at multiple layers is accurate; every governance feature running the moment you install is not."}},
    {"@type":"Question","name":"How much work is it to get Bolt's audit events into our SIEM?","acceptedAnswer":{"@type":"Answer","text":"Between an afternoon and a sprint, depending on the route. Route one is the one most teams already have: set LOG_FORMAT=json and Bolt emits structured events to stdout, where Vector, Fluent Bit, an OpenTelemetry Collector, or a Datadog Agent picks them up like any other workload. If you already ship container logs, this is configuration rather than integration. Route two is a forwarder built into bolt-api that authenticates directly to Splunk HEC, Microsoft Sentinel through the HMAC-signed collector API, Microsoft Sentinel through a Data Collection Rule with AAD OAuth2 and automatic token refresh, or syslog over TCP. Two honest caveats on route two: it is off by default and no shipped values file enables it, so treat it as a deployment step you plan for; and it sends best-effort with no retry buffer, so a transient SIEM outage drops events. If you need guaranteed delivery, use route one with a collector in front, or run both. Either way there is no Sparcle-side ingest to configure, because there is no Sparcle cloud in the path."}},
    {"@type":"Question","name":"Is my data sent to Sparcle?","acceptedAnswer":{"@type":"Answer","text":"No. Sparcle operates no cloud that receives your data and has no hosted ingest path. Local device data such as clipboard, notes, and screenshot indexes is stored encrypted on your machine. When you connect a third-party system such as Gmail or Jira, Bolt talks to that system's API as you configured it; that is action on your systems, not exfiltration to a vendor. PII is masked before any prompt reaches a model."}},
    {"@type":"Question","name":"Can I use my own LLM, and can I switch models later?","acceptedAnswer":{"@type":"Answer","text":"Yes at every tier. Point Bolt at OpenAI, Anthropic, Bedrock, Vertex, Ollama, NVIDIA NIM, LM Studio, or any OpenAI-compatible endpoint. Models are hot-swappable with zero token markup; you pay your provider directly. Bolt also auto-detects and adopts a local OpenAI-compatible runtime if one is already running on your machine."}},
    {"@type":"Question","name":"If I switch models or backends, do I lose governance or have to re-run compliance?","acceptedAnswer":{"@type":"Answer","text":"No. PII masking, human approvals, audit, and identity-aware access attach to the boundary, above a swappable provider layer. Change the model, change the backend, or move to an air-gapped local model, and the same governance applies. You do not re-run compliance because you changed a model."}},
    {"@type":"Question","name":"Do you support our system?","acceptedAnswer":{"@type":"Answer","text":"Almost certainly, by configuration. If it speaks MCP, point Bolt at the server and its tools become governed actions. If it has an API, a short YAML utility manifest turns it into a first-class Bolt action. Bolt ships 100+ integrations today (103 in-house connectors, roughly 350 more via Airbyte, plus any MCP-compliant server), and you can add your own without waiting on our roadmap."}},
    {"@type":"Question","name":"How hard is it to add a new integration or format?","acceptedAnswer":{"@type":"Answer","text":"A few lines of YAML. A utility manifest has a recognize block that matches the input and a transform pipeline that shapes and routes it, locally or to any MCP tool. No fork, no vendor ticket."}},
    {"@type":"Question","name":"Is there vendor lock-in?","acceptedAnswer":{"@type":"Answer","text":"No, at several layers. Model: bring and swap any LLM. Ecosystem: not tied to one vendor's suite, Bolt works across Microsoft 365, Google Workspace, Zoho, Slack, Jira, Salesforce, ServiceNow, SAP, and more via open MCP, with any OIDC identity. Protocol: open MCP, not a proprietary plugin marketplace. Deployment: self-host anywhere including air-gapped, with no dependency on a Sparcle cloud. Agent: bring any ACP coding agent."}},
    {"@type":"Question","name":"Am I locked into Microsoft or Google if I use Bolt?","acceptedAnswer":{"@type":"Answer","text":"No. That is the point. Copilot is welded to Microsoft 365 and Gemini to Google Workspace; Bolt sits above whatever suite you run and connects to Microsoft 365, Google Workspace, Zoho, Slack, Jira, Salesforce, ServiceNow, SAP, and more through the open Model Context Protocol, with any OIDC identity. If you run a mix of suites, or change one later, Bolt does not change. You get the cross-ecosystem reach a single-vendor assistant cannot offer."}},
    {"@type":"Question","name":"Is Bolt just enterprise search? Do I have to pay for parts I will not use?","acceptedAnswer":{"@type":"Answer","text":"No. Bolt is a daily-driver workspace that people open for local utilities, clipboard, notes, and search from day one, then use for governed action across connected systems. Aeira is the separate ACL-aware document-retrieval plane; you can run Bolt without it, or add it when you need governed enterprise search."}},
    {"@type":"Question","name":"Is Bolt a network proxy, firewall, CASB, or antivirus?","acceptedAnswer":{"@type":"Answer","text":"No. Bolt is not an inline network device and not endpoint security. It governs what your workforce does with AI. Keep your proxy and your EDR; Bolt complements them."}},
    {"@type":"Question","name":"Does Bolt run, fine-tune, or serve models on GPUs?","acceptedAnswer":{"@type":"Answer","text":"No. Bolt is the governed workspace, not ML infrastructure. You bring your model, and you or your serving stack such as NVIDIA NIM or vLLM run it. If your primary need is a model farm, pair Bolt with that infrastructure."}},
    {"@type":"Question","name":"How does Aeira search work, and does it need a GPU or a vector database?","acceptedAnswer":{"@type":"Answer","text":"Aeira does hybrid retrieval: keyword search (BM25 and full-text) is the baseline, an optional vector lane adds semantic ranking, and the two are fused with reciprocal rank fusion, all behind an ACL pre-filter so every result is identity-bound. The baseline runs keyword-only on a plain Postgres, CPU-only and air-gappable, with no GPU and no vector database. Semantic ranking is an optional add-on: a vector store (pgvector or Qdrant) plus an embedding backend you supply, which can run on CPU, so a GPU only raises throughput and is never required. The keyword engine, vector store, and embedder each sit behind a swappable interface, so if no embedder is configured you get keyword results, and if one is configured but unavailable Aeira falls back to keyword mid-query rather than failing."}},
    {"@type":"Question","name":"Is local model inference fully on-device today?","acceptedAnswer":{"@type":"Answer","text":"Partly. Bolt auto-detects and adopts a local OpenAI-compatible runtime and masks PII unconditionally at the boundary; that is generally available. The fully on-device generation loop is a committed next slice, and we do not claim it is finished."}},
    {"@type":"Question","name":"Does Bolt work inside Word and Excel like an Office assistant?","acceptedAnswer":{"@type":"Answer","text":"No. Bolt is an overlay plus connectors, not an AI embedded in the Office ribbon. If your entire AI value is in-document and cloud AI is acceptable, a native Office assistant fits that specific need. Bolt fits when you need sovereignty, model choice, cross-system action, and a governed local surface."}},
    {"@type":"Question","name":"Can I deploy air-gapped?","acceptedAnswer":{"@type":"Answer","text":"Yes. Docker Compose for staging, Kubernetes for production HA, on-prem, or fully air-gapped for ITAR and classified environments. License validation uses an offline-signed token, with no outbound calls."}},
    {"@type":"Question","name":"What does it cost, and is there a free tier?","acceptedAnswer":{"@type":"Answer","text":"The full desktop build is free on your own machine with your own API key. Paid self-hosted tiers start at $30 per seat per month with a 10-seat minimum. Founding customers get 25% off any tier, locked for 24 months, through the end of 2026 or until 50 customers sign. See the pricing page for current tiers."}},
    {"@type":"Question","name":"Do I need my own servers to run Bolt?","acceptedAnswer":{"@type":"Answer","text":"Not for the free desktop build, which runs entirely on your laptop with an embedded database and no external services. For a team deployment you self-host inside your own perimeter (Docker Compose for staging, Kubernetes for production HA, on-prem, or air-gapped), so you provide a container host or cluster sized to your seats. In practice that is standard mid-size VMs plus storage, inside your existing cloud or on-prem budget."}},
    {"@type":"Question","name":"Do I need to bring my own LLM, and does that cost extra?","acceptedAnswer":{"@type":"Answer","text":"Yes, you bring the model, and Bolt adds zero token markup. Use your own key (OpenAI, Anthropic, Bedrock, Vertex, and more) or your own served or local model. Your model spend is exactly your provider's price, and a local model costs nothing per token. There is no vendor inference margin on top."}},
    {"@type":"Question","name":"What is the total cost of ownership?","acceptedAnswer":{"@type":"Answer","text":"Three visible parts: the per-seat license, your own infrastructure, and your own token spend. The desktop build is free; paid tiers start at $30 per seat per month. Because there is no token markup and one governed app replaces a stack of point tools, a Bolt deployment typically undercuts stacking a cloud assistant plus an enterprise search tool plus an automation tool. Ask for a modeled scenario in an architecture review, or see the pricing page."}},
    {"@type":"Question","name":"Who is Bolt for? Is it only for large regulated companies?","acceptedAnswer":{"@type":"Answer","text":"Anyone can run the free build on a laptop to evaluate with real data. The paid tiers suit teams that want central deployment and governance, and Bolt has the lowest seat minimum in its category (10 seats). Regulated and security-sensitive organizations are the sharpest fit, but that is a fit, not a gate."}},
    {"@type":"Question","name":"Do you have Fortune-500 reference logos today?","acceptedAnswer":{"@type":"Answer","text":"Public reference logos at that scale are something a pre-scale company earns over time, and many target buyers are in environments where references are contractually restricted. If your procurement requires named public references before any purchase, that is a fair reason to wait. It is a stage limitation, not a capability gap."}},
