# =okta — structured rows + wide detail pane (via bolt-okta.sh). CLI-gated.
# NOTE: rewritten to the CLI's JSON output (live-unverified against every CLI
# version); the helper falls back to line rows if the shape is unexpected.
schema_version: 1
runtime: bridge
id: okta
chip: okta
title: Okta Apps
icon: shield
description: "List via the `okta` CLI. Enter to load, then filter the results."
placeholder_examples: ["Enter to load — then filter the results"]
emits: Generic

detect:
  binary: okta
  auth_check:
    macos: "okta apps"
    linux: "okta apps"
    windows: "okta apps"
  config_hint: ["~/.okta"]
  refresh: on_focus

args:
  - { name: filter, from: "query.word(0)", default: "" }

dispatch:
  confirm_label: "List your Okta apps"
  confirm_hint: "Press ↵ to load · filter the results as you type"

bridge:
  command:
    macos: "python3 {{scripts_dir}}/bolt-okta.py {{filter}}"
    linux: "python3 {{scripts_dir}}/bolt-okta.py {{filter}}"
    windows: "python {{scripts_dir}}/bolt-okta.py {{filter}}"
  parse: json
  timeout_seconds: 15

presentation:
  widget: list
  title_field: title
  subtitle_field: subtitle
  searchable: true
  right_widget:
    kind: entity_preview
    mode: selected_row
    bind:
      title: "{{row.title}}"
      subtitle: "{{row.subtitle}}"
      fields:
        - { label: App, value: "{{row.app}}" }
      body: "{{row.body}}"
      actions: [copy]

actions:
  - { id: copy, kind: composer, target: row, label: Copy, insert: "{{title}}" }
